name: MCP publish
description: >-
  Publish a released MCP server: npm (trusted publishing/provenance),
  .skill + .mcpb artifacts, MCP Registry, ClawHub. Run inside the repo's
  own release-please.yml publish job AFTER checking out the release tag.
  The job needs `contents: write` and `id-token: write`.

inputs:
  version:
    description: Release version (from release-please outputs)
    required: true
  tag-name:
    description: Release tag (from release-please outputs)
    required: true
  package-name:
    description: Artifact/skill base name; defaults to the repository name
    required: false
    default: ""
  skill-path:
    description: >-
      Path to the skill's SKILL.md. When empty, auto-resolves to a root
      SKILL.md, else a single skills/*/SKILL.md (plugin-shaped repos).
    required: false
    default: ""
  node-version:
    description: Node version for the publish toolchain
    required: false
    default: "26"
  publish-npm:
    required: false
    default: "true"
  publish-skill:
    required: false
    default: "true"
  publish-mcpb:
    required: false
    default: "true"
  publish-registry:
    required: false
    default: "true"
  publish-clawhub:
    required: false
    default: "true"
  clawhub-token:
    description: ClawHub token; skipped when empty
    required: false
    default: ""
  github-token:
    description: Token for `gh release upload`
    required: true

runs:
  using: composite
  steps:
    - uses: actions/setup-node@v6
      with:
        node-version: ${{ inputs.node-version }}
        cache: npm
        registry-url: https://registry.npmjs.org

    # Strip always-auth from .npmrc (set by setup-node, deprecated in npm 11)
    - shell: bash
      run: sed -i '/always-auth/d' "$NPM_CONFIG_USERCONFIG"

    - shell: bash
      run: npm ci
    - shell: bash
      run: npm run build

    - name: Resolve names
      shell: bash
      env:
        IN_NAME: ${{ inputs.package-name }}
        VERSION: ${{ inputs.version }}
      run: |
        NAME="${IN_NAME:-${GITHUB_REPOSITORY##*/}}"
        echo "MCP_PUBLISH_NAME=$NAME" >> "$GITHUB_ENV"
        echo "VERSION=$VERSION" >> "$GITHUB_ENV"

    # Plugin-shaped repos keep SKILL.md under skills/<name>/; standalone
    # repos keep it at the root. Resolve once, share via SKILL_MD.
    - name: Resolve skill path
      shell: bash
      env:
        IN_SKILL_PATH: ${{ inputs.skill-path }}
      run: |
        SKILL_MD=""
        if [ -n "$IN_SKILL_PATH" ]; then
          if [ ! -f "$IN_SKILL_PATH" ]; then
            echo "skill-path input '$IN_SKILL_PATH' does not exist." >&2
            exit 1
          fi
          SKILL_MD="$IN_SKILL_PATH"
        elif [ -f SKILL.md ]; then
          SKILL_MD="SKILL.md"
        else
          shopt -s nullglob
          CANDIDATES=(skills/*/SKILL.md)
          if [ "${#CANDIDATES[@]}" -eq 1 ]; then
            SKILL_MD="${CANDIDATES[0]}"
          elif [ "${#CANDIDATES[@]}" -gt 1 ]; then
            echo "Multiple skills/*/SKILL.md found — set the skill-path input." >&2
            exit 1
          fi
        fi
        echo "SKILL_MD=$SKILL_MD" >> "$GITHUB_ENV"

    - name: Package skill
      if: inputs.publish-skill == 'true'
      shell: bash
      run: |
        if [ -z "$SKILL_MD" ]; then
          echo "No SKILL.md found — skipping skill packaging."
          exit 0
        fi
        python3 - <<'EOF'
        import zipfile, pathlib, os

        version = os.environ["VERSION"]
        skill_name = os.environ["MCP_PUBLISH_NAME"]
        skill_md = pathlib.Path(os.environ["SKILL_MD"])
        out = pathlib.Path(f"{skill_name}-{version}.skill")

        with zipfile.ZipFile(out, "w", zipfile.ZIP_DEFLATED) as zf:
            zf.write(skill_md, f"{skill_name}/SKILL.md")

        print(f"Packaged {out} ({out.stat().st_size} bytes)")
        EOF

    - name: Build .mcpb bundle
      if: inputs.publish-mcpb == 'true'
      shell: bash
      run: |
        if [ ! -f manifest.json ]; then
          echo "manifest.json not present — skipping .mcpb bundle."
          exit 0
        fi
        npx @anthropic-ai/mcpb pack
        mv "${MCP_PUBLISH_NAME}.mcpb" "${MCP_PUBLISH_NAME}-${VERSION}.mcpb"

    # Idempotent: skip if this version is already on the registry.
    - name: Publish to npm
      if: inputs.publish-npm == 'true'
      shell: bash
      env:
        # npm rejects --provenance from private source repos; trusted
        # publishing (OIDC auth) itself works either way.
        REPO_PRIVATE: ${{ github.event.repository.private }}
      run: |
        if [ "$(node -p "require('./package.json').private === true")" = "true" ]; then
          echo "package.json is marked private — skipping npm publish."
          exit 0
        fi
        PKG=$(node -p "require('./package.json').name")
        PUBLISHED=$(npm view "${PKG}@${VERSION}" version 2>/dev/null || true)
        if [ "$PUBLISHED" = "$VERSION" ]; then
          echo "npm already has ${PKG}@${VERSION} — skipping publish."
          exit 0
        fi
        if [ "$REPO_PRIVATE" = "true" ]; then
          echo "Private source repo — publishing without provenance."
          npm publish --access public
        else
          npm publish --access public --provenance
        fi

    - name: Check for server.json
      id: registry-check
      if: inputs.publish-registry == 'true'
      shell: bash
      run: |
        if [ -f server.json ]; then
          echo "present=true" >> "$GITHUB_OUTPUT"
        else
          echo "present=false" >> "$GITHUB_OUTPUT"
          echo "server.json not present — skipping MCP Registry publish."
        fi

    - name: Install mcp-publisher
      if: inputs.publish-registry == 'true' && steps.registry-check.outputs.present == 'true'
      uses: chrischall/workflows/.github/actions/install-mcp-publisher@main

    - name: Authenticate to MCP Registry (OIDC)
      if: inputs.publish-registry == 'true' && steps.registry-check.outputs.present == 'true'
      shell: bash
      run: mcp-publisher login github-oidc

    - name: Publish to MCP Registry
      if: inputs.publish-registry == 'true' && steps.registry-check.outputs.present == 'true'
      shell: bash
      run: mcp-publisher publish

    # `secrets.*` is not addressable in composite steps; token arrives as an
    # input and the emptiness check happens in the run block.
    - name: Publish skill to ClawHub
      if: inputs.publish-clawhub == 'true'
      continue-on-error: true
      shell: bash
      env:
        CLAWHUB_TOKEN: ${{ inputs.clawhub-token }}
      run: |
        if [ -z "$CLAWHUB_TOKEN" ]; then
          echo "clawhub-token not set — skipping ClawHub publish."
          exit 0
        fi
        if [ -z "$SKILL_MD" ]; then
          echo "No SKILL.md found — skipping ClawHub publish."
          exit 0
        fi
        npx --yes clawhub login --token "$CLAWHUB_TOKEN" --no-browser
        # ClawHub `publish` rejects plugin-shaped folders; publish SKILL.md
        # from a clean temp dir as a standalone skill.
        SKILL_DIR=$(mktemp -d)
        cp "$SKILL_MD" "$SKILL_DIR/SKILL.md"
        npx --yes clawhub publish "$SKILL_DIR" --version "${VERSION}" --slug "${MCP_PUBLISH_NAME}"

    # release-please already created the GitHub Release; attach artifacts.
    - name: Attach artifacts to release
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github-token }}
        TAG: ${{ inputs.tag-name }}
      run: |
        ARGS=()
        [ -f "${MCP_PUBLISH_NAME}-${VERSION}.skill" ] && ARGS+=("${MCP_PUBLISH_NAME}-${VERSION}.skill")
        [ -f "${MCP_PUBLISH_NAME}-${VERSION}.mcpb" ] && ARGS+=("${MCP_PUBLISH_NAME}-${VERSION}.mcpb")
        if [ "${#ARGS[@]}" -eq 0 ]; then
          echo "No artifacts to attach."
          exit 0
        fi
        gh release upload "$TAG" "${ARGS[@]}" --clobber
