name: MCP publish
description: >-
  Publish a released MCP server: npm (trusted publishing/provenance),
  .skill + .mcpb artifacts, MCP Registry, ClawHub. Run inside the repo's
  own release-please.yml publish job AFTER checking out the release tag.
  The job needs `contents: write` and `id-token: write`.

inputs:
  version:
    description: Release version (from release-please outputs)
    required: true
  tag-name:
    description: Release tag (from release-please outputs)
    required: true
  package-name:
    description: Artifact/skill base name; defaults to the repository name
    required: false
    default: ""
  skill-path:
    description: >-
      Path to a single skill's SKILL.md, pinning publication to just that one.
      When empty, auto-resolves to a root SKILL.md, else EVERY skills/*/SKILL.md
      — a repo shipping several publishes them all, each under its own slug.
    required: false
    default: ""
  node-version:
    description: Node version for the publish toolchain
    required: false
    default: "26"
  publish-npm:
    required: false
    default: "true"
  publish-skill:
    required: false
    default: "true"
  publish-mcpb:
    required: false
    default: "true"
  publish-registry:
    required: false
    default: "true"
  publish-clawhub:
    required: false
    default: "true"
  clawhub-token:
    description: ClawHub token; skipped when empty
    required: false
    default: ""
  github-token:
    description: Token for `gh release upload`
    required: true

runs:
  using: composite
  steps:
    - uses: actions/setup-node@v6
      with:
        node-version: ${{ inputs.node-version }}
        cache: npm
        registry-url: https://registry.npmjs.org

    # Strip always-auth from .npmrc (set by setup-node, deprecated in npm 11)
    - shell: bash
      run: sed -i '/always-auth/d' "$NPM_CONFIG_USERCONFIG"

    - shell: bash
      run: npm ci
    - shell: bash
      run: npm run build

    - name: Resolve names
      shell: bash
      env:
        IN_NAME: ${{ inputs.package-name }}
        VERSION: ${{ inputs.version }}
      run: |
        NAME="${IN_NAME:-${GITHUB_REPOSITORY##*/}}"
        echo "MCP_PUBLISH_NAME=$NAME" >> "$GITHUB_ENV"
        echo "VERSION=$VERSION" >> "$GITHUB_ENV"

    # Plugin-shaped repos keep SKILL.md under skills/<name>/; standalone repos
    # keep it at the root, and a repo may ship several. Resolve once into a
    # manifest ($SKILLS_TSV) that the packaging, ClawHub and attach steps iterate.
    - name: Resolve skill path
      shell: bash
      env:
        IN_SKILL_PATH: ${{ inputs.skill-path }}
      run: |
        # Emits a manifest at $SKILLS_TSV: one "path<TAB>slug" line per skill.
        # A repo may ship several (zola-mcp has zola + zola-api); publishing only
        # the first would silently drop the rest, and erroring — as this used to —
        # broke publishing outright: zola-mcp tagged 1.6.0/1.6.1/1.6.2 while npm
        # stayed at 1.5.0, because this step exits before the npm publish.
        SKILLS_TSV="$RUNNER_TEMP/skills.tsv"
        : > "$SKILLS_TSV"

        add() { printf '%s\t%s\n' "$1" "$2" >> "$SKILLS_TSV"; }

        if [ -n "$IN_SKILL_PATH" ]; then
          if [ ! -f "$IN_SKILL_PATH" ]; then
            echo "skill-path input '$IN_SKILL_PATH' does not exist." >&2
            exit 1
          fi
          # Explicit override stays single and keeps the repo-level slug, so a
          # repo pinning one skill of several publishes exactly what it pinned.
          add "$IN_SKILL_PATH" "$MCP_PUBLISH_NAME"
        elif [ -f SKILL.md ]; then
          add "SKILL.md" "$MCP_PUBLISH_NAME"
        else
          shopt -s nullglob
          CANDIDATES=(skills/*/SKILL.md)
          if [ "${#CANDIDATES[@]}" -eq 1 ]; then
            # Single skill keeps the repo-level slug and artifact name, byte for
            # byte, so existing releases and ClawHub listings are undisturbed.
            add "${CANDIDATES[0]}" "$MCP_PUBLISH_NAME"
          else
            # Several: each gets its own slug from its directory name, otherwise
            # they would collide on one ClawHub slug and one artifact filename.
            for c in "${CANDIDATES[@]}"; do
              d="${c%/SKILL.md}"
              add "$c" "${d#skills/}"
            done
          fi
        fi

        COUNT=$(wc -l < "$SKILLS_TSV" | tr -d ' ')
        echo "SKILLS_TSV=$SKILLS_TSV" >> "$GITHUB_ENV"
        echo "SKILL_COUNT=$COUNT" >> "$GITHUB_ENV"
        if [ "$COUNT" -eq 0 ]; then
          echo "No SKILL.md found."
        else
          echo "Resolved $COUNT skill(s):"
          while IFS=$'\t' read -r p slug; do echo "  $slug  <-  $p"; done < "$SKILLS_TSV"
        fi

    - name: Package skill
      if: inputs.publish-skill == 'true'
      shell: bash
      run: |
        if [ "${SKILL_COUNT:-0}" -eq 0 ]; then
          echo "No SKILL.md found — skipping skill packaging."
          exit 0
        fi
        python3 - <<'EOF'
        import zipfile, pathlib, os

        version = os.environ["VERSION"]
        manifest = pathlib.Path(os.environ["SKILLS_TSV"])
        repo_root = pathlib.Path.cwd().resolve()

        # One archive per skill, named by its slug. With a single skill the slug
        # is the repo-level name, so the artifact filename is unchanged.
        for line in manifest.read_text().splitlines():
            if not line.strip():
                continue
            path, slug = line.split("\t", 1)
            skill_md = pathlib.Path(path)
            skill_dir = skill_md.parent.resolve()
            out = pathlib.Path(f"{slug}-{version}.skill")

            # A skill under skills/<name>/ owns its whole directory: SKILL.md
            # plus references/, scripts, assets. Packaging only SKILL.md ships a
            # skill whose own text points at files that are not in the archive.
            # A root SKILL.md has no directory of its own — that is the repo —
            # so only the file itself goes in.
            members = []
            if skill_dir != repo_root:
                members = sorted(f for f in skill_dir.rglob("*") if f.is_file())
            else:
                members = [skill_md]

            with zipfile.ZipFile(out, "w", zipfile.ZIP_DEFLATED) as zf:
                for f in members:
                    rel = f.name if skill_dir == repo_root else f.relative_to(skill_dir)
                    zf.write(f, f"{slug}/{rel}")
            extra = len(members) - 1
            print(f"Packaged {out} ({out.stat().st_size} bytes, "
                  f"{len(members)} file(s){f', {extra} beyond SKILL.md' if extra else ''})")
        EOF

    - name: Build .mcpb bundle
      if: inputs.publish-mcpb == 'true'
      shell: bash
      run: |
        if [ ! -f manifest.json ]; then
          echo "manifest.json not present — skipping .mcpb bundle."
          exit 0
        fi
        npx @anthropic-ai/mcpb pack
        mv "${MCP_PUBLISH_NAME}.mcpb" "${MCP_PUBLISH_NAME}-${VERSION}.mcpb"

    # Idempotent: skip if this version is already on the registry.
    - name: Publish to npm
      if: inputs.publish-npm == 'true'
      shell: bash
      env:
        # npm rejects --provenance from private source repos; trusted
        # publishing (OIDC auth) itself works either way.
        REPO_PRIVATE: ${{ github.event.repository.private }}
      run: |
        if [ "$(node -p "require('./package.json').private === true")" = "true" ]; then
          echo "package.json is marked private — skipping npm publish."
          exit 0
        fi
        PKG=$(node -p "require('./package.json').name")
        PUBLISHED=$(npm view "${PKG}@${VERSION}" version 2>/dev/null || true)
        if [ "$PUBLISHED" = "$VERSION" ]; then
          echo "npm already has ${PKG}@${VERSION} — skipping publish."
          exit 0
        fi
        if [ "$REPO_PRIVATE" = "true" ]; then
          echo "Private source repo — publishing without provenance."
          npm publish --access public
        else
          npm publish --access public --provenance
        fi

    - name: Check for server.json
      id: registry-check
      if: inputs.publish-registry == 'true'
      shell: bash
      run: |
        if [ -f server.json ]; then
          echo "present=true" >> "$GITHUB_OUTPUT"
        else
          echo "present=false" >> "$GITHUB_OUTPUT"
          echo "server.json not present — skipping MCP Registry publish."
        fi

    - name: Install mcp-publisher
      if: inputs.publish-registry == 'true' && steps.registry-check.outputs.present == 'true'
      uses: chrischall/workflows/.github/actions/install-mcp-publisher@main

    - name: Authenticate to MCP Registry (OIDC)
      if: inputs.publish-registry == 'true' && steps.registry-check.outputs.present == 'true'
      shell: bash
      run: mcp-publisher login github-oidc

    - name: Publish to MCP Registry
      if: inputs.publish-registry == 'true' && steps.registry-check.outputs.present == 'true'
      shell: bash
      run: mcp-publisher publish

    # `secrets.*` is not addressable in composite steps; token arrives as an
    # input and the emptiness check happens in the run block.
    - name: Publish skill to ClawHub
      if: inputs.publish-clawhub == 'true'
      continue-on-error: true
      shell: bash
      env:
        CLAWHUB_TOKEN: ${{ inputs.clawhub-token }}
      run: |
        if [ -z "$CLAWHUB_TOKEN" ]; then
          echo "clawhub-token not set — skipping ClawHub publish."
          exit 0
        fi
        if [ "${SKILL_COUNT:-0}" -eq 0 ]; then
          echo "No SKILL.md found — skipping ClawHub publish."
          exit 0
        fi
        npx --yes clawhub login --token "$CLAWHUB_TOKEN" --no-browser
        # ClawHub `publish` rejects plugin-shaped folders; publish each SKILL.md
        # from a clean temp dir as a standalone skill, under its own slug —
        # reusing one slug would have each skill overwrite the last.
        FAILED=0
        while IFS=$'\t' read -r SKILL_PATH SLUG; do
          [ -n "$SKILL_PATH" ] || continue
          SKILL_DIR=$(mktemp -d)
          SRC_DIR=$(dirname "$SKILL_PATH")
          if [ "$SRC_DIR" = "." ]; then
            cp "$SKILL_PATH" "$SKILL_DIR/SKILL.md"
          else
            # Whole directory: a skill's references/ and scripts are part of it,
            # and shipping SKILL.md alone publishes a skill that points at files
            # the reader does not have.
            cp -R "$SRC_DIR/." "$SKILL_DIR/"
          fi
          echo "Publishing $SLUG to ClawHub..."
          npx --yes clawhub publish "$SKILL_DIR" --version "${VERSION}" --slug "${SLUG}" || {
            echo "::warning title=ClawHub publish failed::$SLUG did not publish"
            FAILED=1
          }
        done < "$SKILLS_TSV"
        exit $FAILED

    # release-please already created the GitHub Release; attach artifacts.
    - name: Attach artifacts to release
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github-token }}
        TAG: ${{ inputs.tag-name }}
      run: |
        ARGS=()
        # Glob rather than name one file: a multi-skill repo produces one
        # archive per skill, and hardcoding the repo name would attach only one.
        shopt -s nullglob
        for f in *-"${VERSION}".skill; do ARGS+=("$f"); done
        [ -f "${MCP_PUBLISH_NAME}-${VERSION}.mcpb" ] && ARGS+=("${MCP_PUBLISH_NAME}-${VERSION}.mcpb")
        if [ "${#ARGS[@]}" -eq 0 ]; then
          echo "No artifacts to attach."
          exit 0
        fi
        gh release upload "$TAG" "${ARGS[@]}" --clobber
