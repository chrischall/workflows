name: Reusable node CI

# Standard node CI for the fleet. Call from a stub on `pull_request`
# (types: [opened, synchronize, reopened, labeled]) and optionally
# `push: branches: [main]`.
#
# CI is DEFERRED until a PR is armed, but the un-armed state BLOCKS the merge.
#
# Real build/test runs only when:
#   - human PRs: `ready-to-merge` is present (added by auto-review on pass/warn);
#   - release-please PRs: `ready-to-merge` is present too — `release-ready` only
#     STARTS the release review; CI waits for that review to pass and arm the PR;
#   - bot PRs (dependabot): always (bots never get auto-review);
#   - push events: always.
#
# Until then the job does NOT skip — it FAILS fast (the "Arm gate" step below).
# This is deliberate: GitHub treats a *skipped* required check as satisfied, so
# skipping un-armed PRs (the old behavior) left `ci / ci` green and let the
# merge button go live BEFORE CI had run. A *failing* `ci / ci` keeps the PR
# un-mergeable (manual or `--auto`) until arming flips the gate and real CI
# actually passes on the current head SHA. The failing check on an un-armed PR
# is expected and clears the moment the arming label is applied.

on:
  workflow_call:
    inputs:
      node-version:
        type: string
        required: false
        default: "26"
      build-command:
        type: string
        required: false
        default: npm run build
      test-command:
        type: string
        required: false
        default: npm test

jobs:
  ci:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      # Gate: pass (run real CI) only when armed / bot / push; otherwise fail so
      # `ci / ci` is a blocking required check until the PR is armed. Never skip
      # — a skipped required check counts as satisfied and would unblock merge.
      - name: Arm gate
        env:
          EVENT_NAME: ${{ github.event_name }}
          USER_TYPE: ${{ github.event.pull_request.user.type }}
          HEAD_REF: ${{ github.event.pull_request.head.ref }}
          LABELS: ${{ join(github.event.pull_request.labels.*.name, ',') }}
        run: |
          if [ "$EVENT_NAME" != "pull_request" ]; then echo "non-PR event → run CI"; exit 0; fi
          if [ "$USER_TYPE" != "User" ]; then echo "bot PR → run CI"; exit 0; fi
          case "$HEAD_REF" in
            release-please--*)
              case ",$LABELS," in
                *,ready-to-merge,*) echo "release PR armed (ready-to-merge — release review passed) → run CI"; exit 0 ;;
              esac
              echo "::error::CI is deferred until the release review passes and arms this PR with 'ready-to-merge'. Add the 'release-ready' label to start the review. This failing check is expected and clears once the PR is armed."
              exit 1 ;;
            *)
              case ",$LABELS," in
                *,ready-to-merge,*) echo "PR armed (ready-to-merge) → run CI"; exit 0 ;;
              esac
              echo "::error::CI is deferred until auto-review arms this PR with the 'ready-to-merge' label. This failing check is expected and clears once the PR is armed."
              exit 1 ;;
          esac

      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ inputs.node-version }}
          cache: npm

      - run: npm ci
      - run: ${{ inputs.build-command }}
      - run: ${{ inputs.test-command }}
