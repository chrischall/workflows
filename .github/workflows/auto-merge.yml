name: Auto-merge PRs

# Dogfood stub — local ref. pull_request_target so dependabot PRs can arm;
# PR code is never executed.

on:
  pull_request_target:
    types: [opened, reopened, ready_for_review, synchronize, labeled]

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: auto-merge-${{ github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  arm:
    uses: ./.github/workflows/reusable-auto-merge.yml
    secrets:
      release_pat: ${{ secrets.RELEASE_PAT }}
